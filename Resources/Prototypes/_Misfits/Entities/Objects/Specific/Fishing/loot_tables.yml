# Irradiated Water
- type: entityTable
  id: IrradiatedWaterFishingLootTable
  table: !type:GroupSelector
    children:
      - !type:NestedSelector
        tableId: GenericFishingLootTable
        weight: 70
      - !type:NestedSelector
        tableId: IrradiatedFishingLootTable
        weight: 20
      - !type:NestedSelector
        tableId: WaterFishTable
        weight: 20
      - !type:NestedSelector
        tableId: EnemyEncounterTable
        weight: 15
      - !type:NestedSelector
        tableId: RareFishTable
        weight: 10
  
